name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check
        run: python -m py_compile server.py pg_compat.py

      - name: Import smoke (SQLite mode)
        env:
          TODO_DATA_DIR: ${{ runner.temp }}/cyan-ci-data
        run: python -c "import server; print('import ok')"

      - name: Run tests
        # 用 python -m pytest（而非裸 pytest）以把仓库根加入 sys.path，
        # 否则 tests 内的 `import server` 会 ModuleNotFoundError。
        run: python -m pytest -q
