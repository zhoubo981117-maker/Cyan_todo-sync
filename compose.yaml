services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - TODO_HOST=0.0.0.0
      - TODO_PORT=8787
      # Optional: allow cross-origin (comma separated), usually not needed.
      # - TODO_ALLOWED_ORIGINS=https://todo.example.com
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:

