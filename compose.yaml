services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - TODO_HOST=0.0.0.0
      - TODO_PORT=8787
      # Optional: allow cross-origin (comma separated), usually not needed.
      # - TODO_ALLOWED_ORIGINS=https://todo.example.com
      # Optional: Feishu bot command integration.
      # - TODO_FEISHU_ENABLED=1
      # - TODO_FEISHU_VERIFY_TOKEN=your-feishu-event-verification-token
      # - TODO_FEISHU_DEFAULT_EMAIL=you@example.com
      # Optional: Xiaomi MiMo AI todo organizer.
      # - TODO_AI_PROVIDER=xiaomi
      # - TODO_AI_API_KEY=your-xiaomi-mimo-api-key
      # - TODO_AI_MODEL=mimo-v2.5
      # - TODO_AI_BASE_URL=https://token-plan-cn.xiaomimimo.com/v1
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
